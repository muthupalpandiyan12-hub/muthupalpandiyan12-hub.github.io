<!DOCTYPE html>
<html>
<head>
  <title>SwastriCare</title>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      const appUrl = "swastricare://join?code=" + code;
      const fallback =
        "https://play.google.com/store/apps/details?id=com.example.swastricarefamilyhub";

      // Try open app
      window.location.href = appUrl;

      // Fallback
      setTimeout(() => {
        window.location.href = fallback;
      }, 2000);
    } else {
      document.body.innerHTML = "Invalid invite link";
    }
  </script>
</head>

<body>
  <h2>Opening SwastriCare App...</h2>
</body>
</html>
