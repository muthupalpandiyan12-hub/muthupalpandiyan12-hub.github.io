```html
<!DOCTYPE html>
<html>
<head>
  <title>SwastriCare</title>

  <script>
    function openApp() {
      const params = new URLSearchParams(window.location.search);
      const family = params.get("family");

      if (!family) return;

      const appLink = "swastricare://join?family=" + family;

      // Try opening app
      window.location.href = appLink;
    }
  </script>
</head>

<body onload="openApp()">

  <h2>Opening SwastriCare App...</h2>

  <!-- 🔥 Manual button -->
  <button onclick="openApp()" style="padding:10px 20px;font-size:16px;">
    Open App
  </button>

</body>
</html>
```
