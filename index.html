<!DOCTYPE html>
<html>
<head>
  <title>SwastriCare</title>

  <script>
    const params = new URLSearchParams(window.location.search);
    const family = params.get("family");

    if (family) {
      // Try open app
      window.location.href = "swastricare://join?family=" + family;

      // Fallback to Play Store
      setTimeout(() => {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.example.swastricarefamilyhub";
      }, 2000);
    }
  </script>
</head>

<body>
  <h2>Opening SwastriCare App...</h2>
</body>
</html>
