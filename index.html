<!DOCTYPE html>
<html>
<head>
    <title>Join Family</title>

    <script>
        function openApp() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get("code");

            if (!code) {
                document.getElementById("msg").innerText = "Invalid invite link";
                return;
            }

            // 🔥 OPEN YOUR APP
            window.location.href = "swastri://join?code=" + code;

            // fallback
            setTimeout(() => {
                document.getElementById("msg").innerText =
                    "If app didn’t open, please install it.";
            }, 2000);
        }
    </script>
</head>

<body onload="openApp()" style="text-align:center; margin-top:50px;">
    <h2>Opening SwastriCare...</h2>
    <p id="msg">Please wait...</p>
</body>
</html>
