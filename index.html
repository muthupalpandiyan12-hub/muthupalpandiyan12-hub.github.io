<!DOCTYPE html>
<html>
<head>
  <title>SwastriCare</title>

  <script>
    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (code) {
        const appUrl = "swastricare://join?code=" + code;

        // Try opening app
        window.location.href = appUrl;

        // Show message if app not installed
        setTimeout(function () {
          document.body.innerHTML =
            "<h2>App not installed</h2><p>Please install SwastriCare app to continue.</p>";
        }, 2000);
      } else {
        document.body.innerHTML = "<h2>Invalid invite link</h2>";
      }
    };
  </script>
</head>

<body>
  <h2>Opening SwastriCare App...</h2>
</body>
</html>
